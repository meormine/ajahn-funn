{% extends "base.html" %}

{% block content %}
<header class="mb-12 flex flex-col items-center text-center">
    <div class="mb-6">
        <img src="{{ root_path }}static/logo.svg" alt="Dhamma Wheel" class="w-24 h-24 md:w-32 md:h-32">
    </div>
    
    <h1 class="text-3xl md:text-5xl font-bold mb-4 text-dhamma-saffron tracking-tight">
        {{ title }}
    </h1>
    <p class="text-lg md:text-xl text-stone-600 dark:text-stone-400 max-w-2xl">
        {{ description }}
    </p>
</header>

<div class="bg-white dark:bg-stone-900 rounded-xl shadow-sm border border-stone-200 dark:border-stone-800 p-2">
    <ul class="divide-y divide-stone-100 dark:divide-stone-800">
        {% for item in items %}
        <li>
            <a href="{{ item.file_path_from_root }}" class="block px-4 py-4 hover:bg-stone-50 dark:hover:bg-stone-800/50 rounded-lg transition-colors group">
                <span class="text-lg text-stone-700 dark:text-stone-300 group-hover:text-dhamma-saffron transition-colors">
                    {{ item.title }}
                </span>
            </a>
        </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
