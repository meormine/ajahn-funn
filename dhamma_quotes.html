    <script src="ajahnFunn.js"></script>

    <script>
        // -----------------------------
        // Theme & UI Logic
        // -----------------------------
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            themeToggleLightIcon.classList.remove('hidden');
            document.documentElement.classList.add('dark');
        } else {
            themeToggleDarkIcon.classList.remove('hidden');
        }

        const themeToggleBtn = document.getElementById('theme-toggle');

        themeToggleBtn.addEventListener('click', function() {
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            if (localStorage.getItem('color-theme')) {
                if (localStorage.getItem('color-theme') === 'light') {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                }
            } else {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                }
            }
        });
        
        // Hamburger Menu Logic
        const menuBtn = document.getElementById('menu-btn');
        const dropdownMenu = document.getElementById('dropdown-menu');

        menuBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdownMenu.classList.toggle('hidden');
        });

        document.addEventListener('click', function(e) {
            if (!dropdownMenu.contains(e.target) && !menuBtn.contains(e.target)) {
                dropdownMenu.classList.add('hidden');
            }
        });

        // -----------------------------
        // Quote Generator Logic
        // -----------------------------
        document.addEventListener('DOMContentLoaded', () => {
            const quoteContainer = document.getElementById('quote-container');
            const newQuoteBtn = document.getElementById('new-quote-btn');
            const copyBtn = document.getElementById('copy-btn');

            let ajahnFunnData = {
                quotes: [],
                queue: []
            };

            // Helper to shuffle an array (Fisher-Yates)
            const shuffle = (array) => {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            };

            // Save queue to localStorage
            const saveQueueToStorage = () => {
                localStorage.setItem('ajahn_funn_quote_queue', JSON.stringify(ajahnFunnData.queue));
            };

            const refreshQueue = () => {
                if(ajahnFunnData.quotes.length > 0) {
                    ajahnFunnData.queue = shuffle([...Array(ajahnFunnData.quotes.length).keys()]);
                    saveQueueToStorage();
                }
            };

            // Initialize Quotes
            const initializeQuotes = () => {
                const savedQueueStr = localStorage.getItem('ajahn_Funn_quote_queue');
                const savedQueue = savedQueueStr ? JSON.parse(savedQueueStr) : null;
                
                // Fetch data from ajahnFunn.js variable
                const rawData = typeof ajahnFunnQuotes !== 'undefined' ? ajahnFunnQuotes : "";
                
                ajahnFunnData.quotes = rawData.split('<hr>')
                    .map(q => q.trim())
                    .filter(q => q.length > 0);

                // Load saved queue if it exists and matches the current data scale
                if (savedQueue && savedQueue.length > 0) {
                    ajahnFunnData.queue = savedQueue;
                } else {
                    refreshQueue();
                }
            };

            // Display Random Quote
           const displayRandomQuote = () => {
    if (ajahnFunnData.quotes.length === 0) {
        quoteContainer.innerHTML = "<em>Quote data is loading or unavailable. Please check ajahnFunn.js</em>";
        return;
    }

    if (ajahnFunnData.queue.length === 0) {
        refreshQueue();
    }

    const quoteIndex = ajahnFunnData.queue.pop();
    saveQueueToStorage();

    // Fade out -> Change text -> Fade in
    quoteContainer.style.opacity = 0;
    setTimeout(() => {
        quoteContainer.innerHTML = ajahnFunnData.quotes[quoteIndex];
        quoteContainer.style.opacity = 1;

        // --- ADD THIS PIECE OF CODE ---
        quoteContainer.scrollIntoView({ 
    behavior: 'smooth', 
    block: 'start' // This moves the focus to the top
});
        // ------------------------------

    }, 400); 
};

            // Copy to Clipboard
            const copyQuote = () => {
                const text = quoteContainer.innerText;
                navigator.clipboard.writeText(text).then(() => {
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = "Copied!";
                    setTimeout(() => { copyBtn.textContent = originalText; }, 2000);
                });
            };

            // Event Listeners
            newQuoteBtn.addEventListener('click', displayRandomQuote);
            quoteContainer.addEventListener('click', displayRandomQuote);
            copyBtn.addEventListener('click', copyQuote);

            // Startup Execution
            initializeQuotes();
            displayRandomQuote();
        });
    </script>
